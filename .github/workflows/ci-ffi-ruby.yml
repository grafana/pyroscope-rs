name: Ruby Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-generated-header:
    name: Check generated Ruby header
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
      - run: cargo install cbindgen --locked --version 0.29.2
      - run: make ffi/ruby/header
      - run: git diff --exit-code

  ruby-linux-build:
    name: Ruby Linux Build
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
      - run: make gem/linux/amd64
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "linux.gem"
          path: pyroscope_ffi/ruby/pkg/*.gem
  ruby-macos-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - macos-version: "14"
            target: x86_64-apple-darwin
            mk-arch: amd64
          - macos-version: "14"
            target: aarch64-apple-darwin
            mk-arch: arm64

    name: Ruby macOS - ${{ matrix.target }}
    runs-on: macos-${{ matrix.macos-version }}

    env:
      RUST_TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@19a43a6a2428d455dbd1b85344698725179c9d8c # v1.289.0
        with:
          ruby-version: "4.0.1"
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      - run: make gem/mac/${{ matrix.mk-arch }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ github.sha }}-ruby-${{ matrix.target }}
          path: pyroscope_ffi/ruby/pkg/*.gem

  ruby-linux-test:
    strategy:
      fail-fast: false
      matrix:
        PYROSCOPE_ONCPU: [1, 0]
        RUBY_VERSION: ["3.1", "3.2", "3.3", "3.3.8", "3.4.3", "3.4.6"]
    needs: ["ruby-linux-build"]
    name: Ruby Linux Test - oncpu=${{ matrix.PYROSCOPE_ONCPU }} - ${{ matrix.RUBY_VERSION }}
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}
    steps:
      - uses: ruby/setup-ruby@19a43a6a2428d455dbd1b85344698725179c9d8c # v1.289.0
        with:
          ruby-version: ${{ matrix.RUBY_VERSION }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: "linux.gem"
          path: "${{github.workspace}}/ruby"
      - run: "cd ${{ github.workspace }}/ruby && ls -l"
      - run: "cd ${{ github.workspace }}/ruby && gem install *.gem"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run Ruby Script
        run: pyroscope_ffi/ruby/scripts/tests/test.rb
        env:
          PYROSCOPE_RUN_ID: ${{ github.run_id }}
          PYROSCOPE_ARCH: x86-64-linux
          PYROSCOPE_API_TOKEN: ${{ secrets.PYROSCOPE_API_TOKEN }}
          PYROSCOPE_ONCPU: ${{ matrix.PYROSCOPE_ONCPU }}
          RUBY_VERSION: ${{ matrix.RUBY_VERSION }}
