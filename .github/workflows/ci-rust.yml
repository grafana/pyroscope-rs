name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: cargo fmt --check
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.95
          components: rustfmt

      - name: Run formatting check
        run: make rust/fmt/check

  clippy:
    name: cargo clippy
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.95
          components: clippy

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- --deny warnings

  doc-tests:
    name: cargo test --doc
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.95

      - name: Run doc tests
        run: cargo test --doc --locked --all-features

  mimalloc-benchmark:
    name: mimalloc benchmark report
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.95

      - name: Restore mimalloc benchmark history
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: target/mimalloc-benchmark/history
          key: mimalloc-benchmark-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            mimalloc-benchmark-history-${{ github.ref_name }}-

      - name: Generate mimalloc benchmark report
        env:
          MIMALLOC_BENCH_DURATION_MS: "1000"
        run: make mimalloc/bench/report

      - name: Upload mimalloc benchmark report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mimalloc-benchmark-report
          path: target/mimalloc-benchmark
          if-no-files-found: error
          retention-days: 14

  test:
    name: cargo test (${{ matrix.arch.name }}, ${{ matrix.libc.name }})
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: x64
            runner: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
          - name: arm64
            runner: ${{ github.repository_owner == 'grafana' && 'ubuntu-arm64-large' || 'ubuntu-24.04-arm' }}
        libc:
          - name: glibc
            base_image: "rust:1.95-trixie"
          - name: musl
            base_image: "rust:1.95-alpine3.22"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run tests
        run: docker build --progress=plain --build-arg BASE_IMAGE=${{ matrix.libc.base_image }} -f ci/test.Dockerfile .
