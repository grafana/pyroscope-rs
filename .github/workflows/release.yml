name: Release

on:
  push:
    tags:
      - 'lib-*'

jobs:
  lib-release:
    permissions:
      contents: write
    name: pyroscope-main
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Verify tag matches Cargo package version
        env:
          TAG: ${{ github.ref_name }}
        run: make check/lib-tag-version
      - uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2.5.3
        with:
          tag_name: "${{ github.ref_name }}"
          name: "pyroscope-${{ github.ref_name }}"
          draft: true
          prerelease: false
