name: Pre-Release

on: [ push ]

jobs:
  lib-release:
    permissions:
      contents: write
    name: pyroscope-main
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    if: "startsWith(github.ref, 'refs/tags/lib-')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify tag matches Cargo package version
        env:
          TAG: ${{ github.ref_name }}
        run: ./ci/check-tag-version.sh "$TAG"
      - uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2.5.3
        with:
          tag_name: "${{ github.ref_name }}"
          name: "pyroscope-${{ github.ref_name }}"
          draft: true
          prerelease: false

  kindasafe-release:
    permissions:
      contents: write
    name: kindasafe
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    if: "startsWith(github.ref, 'refs/tags/kindasafe-')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify tag matches Cargo package version
        env:
          TAG: ${{ github.ref_name }}
        run: ./ci/check-tag-version.sh "$TAG"
      - uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2.5.3
        with:
          tag_name: "${{ github.ref_name }}"
          name: "kindasafe ${{ github.ref_name }}"
          draft: true
          prerelease: false
